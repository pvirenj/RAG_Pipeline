services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: "rag_pipeline_qdrant"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - local
    restart: always

volumes:
  qdrant_data:

networks:
  local:
    driver: bridge